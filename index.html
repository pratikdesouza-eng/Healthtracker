<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Pratik Health"/>
<title>Pratik Health Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.8.0/Recharts.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#100f0d;font-family:'DM Sans',sans-serif;color:#f0ebe4;overscroll-behavior:none;}
  input,textarea,button{font-family:'DM Sans',sans-serif;}
  ::-webkit-scrollbar{width:0;}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  .fade-in{animation:fadeIn 0.35s ease forwards;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid #3a3830;border-top-color:#f5c842;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:8px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useEffect, useRef } = React;
const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

// ── Constants ──────────────────────────────────────────────────────────────
const GOALS = {
  startWeight: 90.7, startBF: 40.1, startDate: "2026-04-26",
  targetBF: 20, targetWeight: 67.9, fatToLose: 22.8,
  weeklyLoss: 0.75, dailyCalories: 1650, dailyProtein: 130,
  dailyCarbs: 150, dailyFat: 55, tdee: 2300,
};

const QUICK_MEALS = [
  "1 wheat chapati with vegetable sabzi",
  "2 wheat chapati with vegetable sabzi",
  "Glass of buttermilk (200ml)",
  "5 soaked almonds",
  "Black coffee with half tsp sugar",
  "Bowl of cucumber carrot salad",
  "150g cooked rice with dal",
  "150g cooked rice with sambar",
  "150g cooked rice with chicken gravy",
  "2 boiled eggs",
  "Egg bhurji (2 eggs)",
  "100g paneer sabzi",
  "Bowl of curd (150g)",
  "200g mutton curry",
  "Tandoori chicken kebab (150g)",
  "Bowl of sprouts",
  "Whey protein shake (1 scoop)",
];

const TODAY = new Date().toISOString().split("T")[0];

// ── Storage helpers ────────────────────────────────────────────────────────
const store = {
  get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
  set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
};

// ── Colour / style tokens ──────────────────────────────────────────────────
const C = {
  bg: "#100f0d", card: "#181613", card2: "#201e1a",
  border: "#1e1c18", muted: "#3a3830", dim: "#55504a",
  text: "#f0ebe4", sub: "#b8b0a6",
  gold: "#f5c842", green: "#4ade80", red: "#ef4444",
  blue: "#60a5fa", purple: "#c084fc",
};

const s = {
  card: { background: C.card, borderRadius: 18, padding: 18, marginBottom: 14 },
  label: { fontSize: 10, color: C.dim, letterSpacing: 2, textTransform: "uppercase", marginBottom: 10, display: "block" },
  input: {
    width: "100%", background: "#1a1815", border: `1px solid #2e2b26`,
    borderRadius: 10, padding: "12px 14px", color: C.text,
    fontSize: 15, outline: "none", display: "block",
  },
  btn: (active, color="#f5c842") => ({
    width: "100%", padding: "13px 0", background: active ? color : C.muted,
    color: active ? "#100f0d" : C.dim, border: "none", borderRadius: 12,
    fontWeight: 700, fontSize: 15, cursor: active ? "pointer" : "not-allowed",
    transition: "all 0.25s",
  }),
};

// ─────────────────────────────────────────────────────────────────────────
// SETUP SCREEN — API key entry
// ─────────────────────────────────────────────────────────────────────────
function SetupScreen({ onDone }) {
  const [key, setKey] = useState("");
  const [err, setErr] = useState("");
  const [testing, setTesting] = useState(false);

  async function verify() {
    if (!key.startsWith("sk-ant-")) { setErr("Key should start with sk-ant-"); return; }
    setTesting(true); setErr("");
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-access": "true" },
        body: JSON.stringify({ model: "claude-haiku-20240307", max_tokens: 10, messages: [{ role: "user", content: "Hi" }] }),
      });
      if (r.ok) { store.set("pratik_apikey", key); onDone(key); }
      else { setErr("Key seems invalid — double check it."); }
    } catch { setErr("Network error — are you online?"); }
    setTesting(false);
  }

  return (
    <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 28, background: C.bg }}>
      <div style={{ fontSize: 48, marginBottom: 16 }}>🏋️</div>
      <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 26, color: C.gold, marginBottom: 8, textAlign: "center" }}>Pratik Health Hub</div>
      <div style={{ fontSize: 13, color: C.dim, textAlign: "center", marginBottom: 32, lineHeight: 1.6, maxWidth: 320 }}>
        To analyse your meals with AI, enter your Anthropic API key. This is stored only on this device.
      </div>

      <div style={{ width: "100%", maxWidth: 380 }}>
        <div style={{ ...s.card, padding: 22 }}>
          <span style={s.label}>Anthropic API Key</span>
          <input type="password" placeholder="sk-ant-api03-..." value={key} onChange={e => setKey(e.target.value)}
            style={{ ...s.input, marginBottom: 14, fontSize: 14, letterSpacing: 1 }} />
          {err && <div style={{ fontSize: 12, color: C.red, marginBottom: 12 }}>{err}</div>}
          <button onClick={verify} disabled={!key || testing} style={s.btn(!!key && !testing)}>
            {testing ? <><span className="spinner"/>Verifying…</> : "Save & Continue →"}
          </button>
        </div>
        <div style={{ fontSize: 11, color: C.muted, textAlign: "center", lineHeight: 1.7 }}>
          Get a free key at <strong style={{ color: C.sub }}>console.anthropic.com</strong><br/>
          Your key never leaves this device.
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// MAIN APP
// ─────────────────────────────────────────────────────────────────────────
function App() {
  const [apiKey, setApiKey] = useState(() => store.get("pratik_apikey") || "");
  const [tab, setTab] = useState("today");
  const [dailyData, setDailyData] = useState(() => store.get("pratik_daily_v3") || {});
  const [weighIns, setWeighIns] = useState(() => store.get("pratik_weighins_v3") || [{ date: "2026-04-26", weight: 90.7, bfPercent: 40.1 }]);

  if (!apiKey) return <SetupScreen onDone={k => setApiKey(k)} />;

  const saveDailyData = (d) => { setDailyData(d); store.set("pratik_daily_v3", d); };
  const saveWeighIns = (w) => { setWeighIns(w); store.set("pratik_weighins_v3", w); };

  const todayLog = dailyData[TODAY] || { meals: [], appleHealth: null };
  const totalCal = todayLog.meals.reduce((s, m) => s + (m.calories || 0), 0);
  const totalProtein = todayLog.meals.reduce((s, m) => s + (m.protein || 0), 0);
  const totalCarbs = todayLog.meals.reduce((s, m) => s + (m.carbs || 0), 0);
  const totalFat = todayLog.meals.reduce((s, m) => s + (m.fat || 0), 0);

  const latestWeigh = weighIns.length ? weighIns[weighIns.length - 1] : { weight: GOALS.startWeight, bfPercent: GOALS.startBF };
  const weightLost = Math.max(0, GOALS.startWeight - latestWeigh.weight);
  const totalToLose = GOALS.startWeight - GOALS.targetWeight;
  const progressPct = Math.min((weightLost / totalToLose) * 100, 100);
  const daysToGoal = Math.round(Math.max(0, (totalToLose - weightLost) / GOALS.weeklyLoss * 7));
  const projectedDate = new Date(); projectedDate.setDate(projectedDate.getDate() + daysToGoal);

  const tabStyle = (t) => ({
    flex: 1, background: "none", border: "none",
    borderBottom: tab === t ? `2px solid ${C.gold}` : "2px solid transparent",
    color: tab === t ? C.gold : C.dim,
    fontSize: 9, fontWeight: 700, letterSpacing: 1.5,
    textTransform: "uppercase", cursor: "pointer", padding: "11px 2px",
    transition: "all 0.2s",
  });

  return (
    <div style={{ background: C.bg, minHeight: "100vh", maxWidth: 480, margin: "0 auto" }}>

      {/* ── Header ── */}
      <div style={{ background: "#13120f", padding: "env(safe-area-inset-top, 16px) 18px 0", borderBottom: `1px solid ${C.border}`, position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12, paddingTop: 6 }}>
          <div>
            <div style={{ fontSize: 9, color: C.dim, letterSpacing: 2, textTransform: "uppercase", marginBottom: 3 }}>
              {new Date().toLocaleDateString("en-IN", { weekday: "long", day: "numeric", month: "long", year: "numeric" })}
            </div>
            <div style={{ fontSize: 20, fontFamily: "'Playfair Display',serif", color: C.gold, fontWeight: 700 }}>Pratik's Health Hub</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 9, color: C.dim, textTransform: "uppercase", letterSpacing: 1 }}>Goal in</div>
            <div style={{ fontSize: 30, fontWeight: 700, color: C.gold, lineHeight: 1 }}>{daysToGoal}d</div>
            <div style={{ fontSize: 9, color: C.dim }}>{projectedDate.toLocaleDateString("en-IN", { day: "numeric", month: "short", year: "2-digit" })}</div>
          </div>
        </div>
        <div style={{ display: "flex" }}>
          {[["today","Today"],["log","Add Meal"],["progress","Progress"],["weigh","Weigh-In"],["settings","⚙"]].map(([t,l]) => (
            <button key={t} onClick={() => setTab(t)} style={tabStyle(t)}>{l}</button>
          ))}
        </div>
      </div>

      <div style={{ padding: "16px 14px 80px" }} className="fade-in" key={tab}>

        {tab === "today" && <TodayTab todayLog={todayLog} totalCal={totalCal} totalProtein={totalProtein} totalCarbs={totalCarbs} totalFat={totalFat} dailyData={dailyData} saveDailyData={saveDailyData} setTab={setTab} />}
        {tab === "log" && <LogTab apiKey={apiKey} todayLog={todayLog} dailyData={dailyData} saveDailyData={saveDailyData} setTab={setTab} />}
        {tab === "progress" && <ProgressTab weighIns={weighIns} weightLost={weightLost} totalToLose={totalToLose} progressPct={progressPct} daysToGoal={daysToGoal} projectedDate={projectedDate} latestWeigh={latestWeigh} />}
        {tab === "weigh" && <WeighTab weighIns={weighIns} saveWeighIns={saveWeighIns} />}
        {tab === "settings" && <SettingsTab onReset={() => { store.set("pratik_apikey",""); setApiKey(""); }} apiKey={apiKey} />}

      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// TODAY TAB
// ─────────────────────────────────────────────────────────────────────────
function TodayTab({ todayLog, totalCal, totalProtein, totalCarbs, totalFat, dailyData, saveDailyData, setTab }) {
  const [healthInput, setHealthInput] = useState({ steps: "", caloriesBurned: "", workoutMins: "", standHours: "" });
  const [healthSaved, setHealthSaved] = useState(false);
  const calPct = Math.min(totalCal / GOALS.dailyCalories, 1);
  const deficit = GOALS.tdee - totalCal;
  const CIRC = 2 * Math.PI * 52;

  const removeMeal = (id) => {
    const updated = { ...dailyData, [TODAY]: { ...todayLog, meals: todayLog.meals.filter(m => m.id !== id) } };
    saveDailyData(updated);
  };

  const saveHealth = () => {
    const updated = { ...dailyData, [TODAY]: { ...todayLog, appleHealth: {
      steps: parseInt(healthInput.steps) || 0,
      caloriesBurned: parseInt(healthInput.caloriesBurned) || 0,
      workoutMins: parseInt(healthInput.workoutMins) || 0,
      standHours: parseInt(healthInput.standHours) || 0,
    }}};
    saveDailyData(updated);
    setHealthSaved(true);
    setTimeout(() => setHealthSaved(false), 2500);
  };

  const clearHealth = () => {
    const updated = { ...dailyData, [TODAY]: { ...todayLog, appleHealth: null } };
    saveDailyData(updated);
  };

  return (
    <>
      {/* Calorie ring */}
      <div style={{ ...s.card, display: "flex", alignItems: "center", gap: 16 }}>
        <div style={{ position: "relative", flexShrink: 0 }}>
          <svg width="120" height="120" viewBox="0 0 120 120">
            <circle cx="60" cy="60" r="52" fill="none" stroke="#252118" strokeWidth="9"/>
            <circle cx="60" cy="60" r="52" fill="none"
              stroke={totalCal > GOALS.dailyCalories ? C.red : C.gold}
              strokeWidth="9" strokeLinecap="round"
              strokeDasharray={`${calPct * CIRC} ${CIRC}`}
              transform="rotate(-90 60 60)"
              style={{ transition: "stroke-dasharray 0.6s ease" }}/>
          </svg>
          <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
            <div style={{ fontSize: 26, fontWeight: 700, color: totalCal > GOALS.dailyCalories ? C.red : C.text, lineHeight: 1 }}>{totalCal}</div>
            <div style={{ fontSize: 9, color: C.dim, marginTop: 2 }}>kcal eaten</div>
          </div>
        </div>
        <div style={{ flex: 1 }}>
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 10, color: C.dim }}>Daily Target</div>
            <div style={{ fontSize: 17, fontWeight: 700 }}>{GOALS.dailyCalories} kcal</div>
          </div>
          <div style={{ padding: "9px 13px", background: deficit >= 0 ? "#152215" : "#221515", borderRadius: 10 }}>
            <div style={{ fontSize: 10, color: C.dim, marginBottom: 2 }}>Estimated Deficit</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: deficit >= 0 ? C.green : C.red }}>
              {deficit >= 0 ? "−" : "+"}{Math.abs(deficit)} kcal
            </div>
          </div>
          {todayLog.appleHealth?.caloriesBurned > 0 && (
            <div style={{ marginTop: 8, fontSize: 11, color: C.dim }}>🔥 {todayLog.appleHealth.caloriesBurned} active cal burned today</div>
          )}
        </div>
      </div>

      {/* Macros */}
      <div style={s.card}>
        <span style={s.label}>Macros Today</span>
        {[
          { name: "Protein", val: totalProtein, target: GOALS.dailyProtein, color: C.gold, emoji: "💪" },
          { name: "Carbs", val: totalCarbs, target: GOALS.dailyCarbs, color: C.blue, emoji: "🌾" },
          { name: "Fat", val: totalFat, target: GOALS.dailyFat, color: C.purple, emoji: "🥑" },
        ].map(m => (
          <div key={m.name} style={{ marginBottom: 13 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5 }}>
              <span style={{ fontSize: 13, color: C.sub }}>{m.emoji} {m.name}</span>
              <span style={{ fontSize: 13 }}>
                <span style={{ color: m.val >= m.target ? C.green : m.color, fontWeight: 700 }}>{m.val}g</span>
                <span style={{ color: C.muted }}> / {m.target}g</span>
              </span>
            </div>
            <div style={{ height: 7, background: "#252118", borderRadius: 4, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${Math.min(m.val / m.target * 100, 100)}%`, background: m.color, borderRadius: 4, transition: "width 0.5s" }}/>
            </div>
          </div>
        ))}
        {totalProtein < 80 && (
          <div style={{ marginTop: 6, padding: "9px 12px", background: "#2a1f0f", borderRadius: 8, fontSize: 12, color: C.gold }}>
            ⚠️ Protein is low — add eggs, paneer or a protein shake.
          </div>
        )}
      </div>

      {/* Apple Watch */}
      <div style={s.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <span style={s.label}>Apple Watch 🍎</span>
          {todayLog.appleHealth && <button onClick={clearHealth} style={{ background: "none", border: "none", color: C.dim, fontSize: 11, cursor: "pointer" }}>re-enter</button>}
        </div>
        {todayLog.appleHealth ? (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {[
              { emoji: "👣", label: "Steps", val: (todayLog.appleHealth.steps||0).toLocaleString(), note: "goal 8,000" },
              { emoji: "🔥", label: "Active Cal", val: `${todayLog.appleHealth.caloriesBurned||0}`, note: "kcal" },
              { emoji: "🏋️", label: "Workout", val: `${todayLog.appleHealth.workoutMins||0} min`, note: "goal 60 min" },
              { emoji: "🕐", label: "Stand", val: `${todayLog.appleHealth.standHours||0}h`, note: "goal 12h" },
            ].map(item => (
              <div key={item.label} style={{ background: C.card2, borderRadius: 12, padding: 13 }}>
                <div style={{ fontSize: 22, marginBottom: 4 }}>{item.emoji}</div>
                <div style={{ fontSize: 18, fontWeight: 700 }}>{item.val}</div>
                <div style={{ fontSize: 10, color: C.dim }}>{item.note}</div>
              </div>
            ))}
          </div>
        ) : (
          <>
            <div style={{ fontSize: 12, color: C.dim, marginBottom: 12, lineHeight: 1.6 }}>
              Open Health app on iPhone → copy today's rings here each evening.
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 14 }}>
              {[
                { key: "steps", label: "Steps", ph: "e.g. 7500" },
                { key: "caloriesBurned", label: "Active Calories", ph: "e.g. 480" },
                { key: "workoutMins", label: "Workout (min)", ph: "e.g. 60" },
                { key: "standHours", label: "Stand Hours", ph: "e.g. 10" },
              ].map(f => (
                <div key={f.key}>
                  <div style={{ fontSize: 10, color: C.dim, marginBottom: 5 }}>{f.label}</div>
                  <input type="number" placeholder={f.ph} value={healthInput[f.key]}
                    onChange={e => setHealthInput(p => ({ ...p, [f.key]: e.target.value }))}
                    style={{ ...s.input, padding: "10px 12px", fontSize: 14 }}/>
                </div>
              ))}
            </div>
            <button onClick={saveHealth} style={s.btn(true, healthSaved ? C.green : C.gold)}>
              {healthSaved ? "✓ Saved!" : "Save Apple Watch Data"}
            </button>
          </>
        )}
      </div>

      {/* Meals list */}
      <div style={s.card}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <span style={s.label}>Today's Meals</span>
          <button onClick={() => setTab("log")} style={{ background: C.gold, color: "#100f0d", border: "none", borderRadius: 8, padding: "7px 14px", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            + Add
          </button>
        </div>
        {todayLog.meals.length === 0 ? (
          <div style={{ textAlign: "center", padding: "28px 0", color: C.muted, fontSize: 13 }}>
            <div style={{ fontSize: 36, marginBottom: 10 }}>🍽️</div>
            No meals logged yet. Tap + Add to start.
          </div>
        ) : (
          todayLog.meals.map((meal, i) => (
            <div key={meal.id || i} style={{ padding: "12px 0", borderBottom: i < todayLog.meals.length - 1 ? `1px solid ${C.border}` : "none", display: "flex", justifyContent: "space-between", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600, marginBottom: 3 }}>{meal.name}</div>
                <div style={{ fontSize: 11, color: C.dim }}>P {meal.protein}g · C {meal.carbs}g · F {meal.fat}g</div>
                {meal.notes && <div style={{ fontSize: 11, color: "#9b7c2f", marginTop: 3, lineHeight: 1.5 }}>💡 {meal.notes}</div>}
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                <div style={{ fontSize: 16, fontWeight: 700, color: C.gold }}>{meal.calories}</div>
                <button onClick={() => removeMeal(meal.id)} style={{ background: "none", border: "none", color: C.muted, cursor: "pointer", fontSize: 20, lineHeight: 1, padding: "0 4px" }}>×</button>
              </div>
            </div>
          ))
        )}
      </div>
    </>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// LOG / ADD MEAL TAB
// ─────────────────────────────────────────────────────────────────────────
function LogTab({ apiKey, todayLog, dailyData, saveDailyData, setTab }) {
  const [input, setInput] = useState("");
  const [analyzing, setAnalyzing] = useState(false);
  const [result, setResult] = useState(null);
  const [err, setErr] = useState(null);

  const analyze = async () => {
    if (!input.trim()) return;
    setAnalyzing(true); setErr(null); setResult(null);
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-haiku-20240307",
          max_tokens: 400,
          system: `You are a precise nutrition expert specialising in Indian food. Given a meal description, respond ONLY with a valid JSON object — no markdown, no preamble:
{"name":"concise meal name","calories":integer,"protein":integer,"carbs":integer,"fat":integer,"notes":"one short sentence on whether this is good or bad for fat loss and why"}
Use authentic South Indian/Indian portion sizes. Be accurate.`,
          messages: [{ role: "user", content: `Analyze: ${input}` }],
        }),
      });
      const data = await r.json();
      const raw = data.content?.find(b => b.type === "text")?.text || "";
      setResult(JSON.parse(raw.replace(/```json|```/g, "").trim()));
    } catch { setErr("Couldn't analyse — try rephrasing."); }
    setAnalyzing(false);
  };

  const addMeal = () => {
    const updated = { ...dailyData, [TODAY]: { ...todayLog, meals: [...todayLog.meals, { ...result, id: Date.now() }] } };
    saveDailyData(updated);
    setInput(""); setResult(null); setTab("today");
  };

  return (
    <>
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 22, fontWeight: 700, marginBottom: 4 }}>Log a Meal</div>
        <div style={{ fontSize: 13, color: C.dim }}>Describe what you ate — AI calculates the nutrition.</div>
      </div>

      <div style={s.card}>
        <span style={s.label}>What did you eat?</span>
        <textarea value={input} onChange={e => setInput(e.target.value)}
          placeholder="e.g. 2 wheat chapati with aloo sabzi and a bowl of cucumber carrot salad"
          style={{ ...s.input, minHeight: 88, resize: "none", lineHeight: 1.6, marginBottom: 12 }}/>
        <button onClick={analyze} disabled={analyzing || !input.trim()} style={s.btn(!analyzing && !!input.trim())}>
          {analyzing ? <><span className="spinner"/>Analysing…</> : "✦ Analyse with AI"}
        </button>
        {err && <div style={{ marginTop: 10, fontSize: 12, color: C.red }}>{err}</div>}
      </div>

      {result && (
        <div style={{ ...s.card, background: "#132213", border: `1px solid #2a4a2a` }}>
          <div style={{ fontSize: 10, color: C.green, letterSpacing: 2, textTransform: "uppercase", marginBottom: 10 }}>✓ Analysis Ready</div>
          <div style={{ fontSize: 17, fontWeight: 700, marginBottom: 14 }}>{result.name}</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 8, marginBottom: 14 }}>
            {[
              { label: "Cal", val: result.calories, unit: "kcal", color: C.gold },
              { label: "Protein", val: `${result.protein}g`, color: "#fbbf24" },
              { label: "Carbs", val: `${result.carbs}g`, color: C.blue },
              { label: "Fat", val: `${result.fat}g`, color: C.purple },
            ].map(m => (
              <div key={m.label} style={{ background: "#1a2e1a", borderRadius: 10, padding: 10, textAlign: "center" }}>
                <div style={{ fontSize: 17, fontWeight: 700, color: m.color }}>{m.val}</div>
                <div style={{ fontSize: 9, color: C.dim, marginTop: 2, textTransform: "uppercase" }}>{m.label}</div>
              </div>
            ))}
          </div>
          {result.notes && <div style={{ fontSize: 12, color: "#9b9490", marginBottom: 14, fontStyle: "italic", lineHeight: 1.6 }}>💡 {result.notes}</div>}
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => { setResult(null); setInput(""); }} style={{ flex: 1, padding: 12, background: C.muted, color: C.sub, border: "none", borderRadius: 10, fontWeight: 600, cursor: "pointer" }}>Retry</button>
            <button onClick={addMeal} style={{ flex: 2, padding: 12, background: C.green, color: "#0a1a0a", border: "none", borderRadius: 10, fontWeight: 700, cursor: "pointer" }}>✓ Add to Today</button>
          </div>
        </div>
      )}

      <div style={s.card}>
        <span style={s.label}>Your Regular Meals — Tap to Fill</span>
        {QUICK_MEALS.map(meal => (
          <button key={meal} onClick={() => setInput(meal)}
            style={{ display: "block", width: "100%", textAlign: "left", padding: "10px 13px", background: C.card2, border: "none", borderRadius: 9, color: C.sub, fontSize: 13, cursor: "pointer", marginBottom: 6 }}>
            + {meal}
          </button>
        ))}
      </div>
    </>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// PROGRESS TAB
// ─────────────────────────────────────────────────────────────────────────
function ProgressTab({ weighIns, weightLost, totalToLose, progressPct, daysToGoal, projectedDate, latestWeigh }) {
  return (
    <>
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 22, fontWeight: 700 }}>Your Progress</div>
      </div>

      <div style={s.card}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 14 }}>
          <div>
            <div style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 2 }}>Lost So Far</div>
            <div style={{ fontSize: 40, fontWeight: 700, color: C.green, lineHeight: 1 }}>{weightLost.toFixed(1)} kg</div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: 1, marginBottom: 2 }}>To Go</div>
            <div style={{ fontSize: 40, fontWeight: 700, color: C.gold, lineHeight: 1 }}>{Math.max(0, totalToLose - weightLost).toFixed(1)} kg</div>
          </div>
        </div>
        <div style={{ height: 10, background: "#252118", borderRadius: 5, overflow: "hidden", marginBottom: 6 }}>
          <div style={{ height: "100%", width: `${progressPct}%`, background: "linear-gradient(90deg, #4ade80, #f5c842)", borderRadius: 5, transition: "width 0.8s" }}/>
        </div>
        <div style={{ fontSize: 12, color: C.dim, textAlign: "center" }}>
          {progressPct.toFixed(1)}% complete — projected goal: {projectedDate.toLocaleDateString("en-IN", { day: "numeric", month: "long", year: "numeric" })}
        </div>
      </div>

      <div style={s.card}>
        <span style={s.label}>Body Stats</span>
        {[
          { label: "Current Weight", start: `${GOALS.startWeight} kg`, now: `${latestWeigh.weight} kg`, good: latestWeigh.weight < GOALS.startWeight },
          { label: "Body Fat", start: `${GOALS.startBF}%`, now: latestWeigh.bfPercent ? `${latestWeigh.bfPercent}%` : "—", good: latestWeigh.bfPercent && latestWeigh.bfPercent < GOALS.startBF },
          { label: "Target Weight", start: "—", now: `${GOALS.targetWeight} kg`, good: false },
          { label: "Target Body Fat", start: "—", now: `${GOALS.targetBF}%`, good: false },
        ].map(r => (
          <div key={r.label} style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr 1fr", borderTop: `1px solid ${C.border}`, padding: "11px 0" }}>
            <div style={{ fontSize: 13, color: C.sub }}>{r.label}</div>
            <div style={{ fontSize: 13, color: C.dim }}>{r.start}</div>
            <div style={{ fontSize: 13, fontWeight: 700, color: r.good ? C.green : C.gold }}>{r.now}</div>
          </div>
        ))}
      </div>

      {weighIns.length > 1 ? (
        <div style={s.card}>
          <span style={s.label}>Weight Trend</span>
          <ResponsiveContainer width="100%" height={170}>
            <LineChart data={weighIns} margin={{ top: 5, right: 10, bottom: 5, left: -20 }}>
              <CartesianGrid stroke="#1e1c18" strokeDasharray="4 4"/>
              <XAxis dataKey="date" tick={{ fill: C.dim, fontSize: 10 }} tickFormatter={d => d.slice(5)}/>
              <YAxis tick={{ fill: C.dim, fontSize: 10 }} domain={["auto","auto"]}/>
              <Tooltip contentStyle={{ background: "#181613", border: `1px solid #2e2b26`, color: C.text, borderRadius: 10, fontSize: 13 }}
                formatter={v => [`${v} kg`, "Weight"]}
                labelFormatter={l => new Date(l + "T12:00:00").toLocaleDateString("en-IN", { day: "numeric", month: "short" })}/>
              <Line type="monotone" dataKey="weight" stroke={C.gold} strokeWidth={2.5} dot={{ fill: C.gold, r: 5, strokeWidth: 0 }} activeDot={{ r: 7 }}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      ) : (
        <div style={{ ...s.card, textAlign: "center", color: C.muted, padding: 32 }}>
          <div style={{ fontSize: 36, marginBottom: 10 }}>📈</div>
          <div style={{ fontSize: 13 }}>Log more weigh-ins to see your trend chart.</div>
        </div>
      )}

      <div style={s.card}>
        <span style={s.label}>At Your Target Pace</span>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          {[
            { emoji: "🎯", label: "Target pace", val: "0.75 kg/week" },
            { emoji: "📅", label: "Days to goal", val: `${daysToGoal} days` },
            { emoji: "⚖️", label: "Current weight", val: `${latestWeigh.weight} kg` },
            { emoji: "🏁", label: "Goal weight", val: `${GOALS.targetWeight} kg` },
          ].map(item => (
            <div key={item.label} style={{ background: C.card2, borderRadius: 12, padding: 14 }}>
              <div style={{ fontSize: 22, marginBottom: 6 }}>{item.emoji}</div>
              <div style={{ fontSize: 16, fontWeight: 700 }}>{item.val}</div>
              <div style={{ fontSize: 10, color: C.dim, marginTop: 3 }}>{item.label}</div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// WEIGH-IN TAB
// ─────────────────────────────────────────────────────────────────────────
function WeighTab({ weighIns, saveWeighIns }) {
  const [form, setForm] = useState({ weight: "", bfPercent: "" });
  const [saved, setSaved] = useState(false);

  const save = () => {
    if (!form.weight) return;
    const entry = { date: TODAY, weight: parseFloat(form.weight), bfPercent: form.bfPercent ? parseFloat(form.bfPercent) : null };
    const updated = [...weighIns.filter(w => w.date !== TODAY), entry].sort((a, b) => a.date.localeCompare(b.date));
    saveWeighIns(updated);
    setForm({ weight: "", bfPercent: "" });
    setSaved(true); setTimeout(() => setSaved(false), 2500);
  };

  return (
    <>
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 22, fontWeight: 700, marginBottom: 4 }}>Weigh-In</div>
        <div style={{ fontSize: 13, color: C.dim, lineHeight: 1.6 }}>
          Weigh yourself first thing in the morning — after bathroom, before food or water.
        </div>
      </div>

      <div style={s.card}>
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 11, color: C.dim, marginBottom: 7 }}>Today's Weight (kg) *</div>
          <input type="number" step="0.1" placeholder="e.g. 90.2" value={form.weight}
            onChange={e => setForm(p => ({ ...p, weight: e.target.value }))}
            style={{ ...s.input, fontSize: 32, fontWeight: 700, padding: 14 }}/>
        </div>
        <div style={{ marginBottom: 20 }}>
          <div style={{ fontSize: 11, color: C.dim, marginBottom: 7 }}>Body Fat % — optional (if you have InBody or smart scale)</div>
          <input type="number" step="0.1" placeholder="e.g. 39.5" value={form.bfPercent}
            onChange={e => setForm(p => ({ ...p, bfPercent: e.target.value }))}
            style={{ ...s.input, fontSize: 22 }}/>
        </div>
        <button onClick={save} disabled={!form.weight} style={s.btn(!!form.weight, saved ? C.green : C.gold)}>
          {saved ? "✓ Saved!" : "Save Weigh-In"}
        </button>
      </div>

      <div style={s.card}>
        <span style={s.label}>History</span>
        {[...weighIns].reverse().map((w, i, arr) => {
          const prev = arr[i + 1];
          const diff = prev ? (w.weight - prev.weight).toFixed(1) : null;
          return (
            <div key={w.date} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 0", borderBottom: i < arr.length - 1 ? `1px solid ${C.border}` : "none" }}>
              <div>
                <div style={{ fontSize: 14, fontWeight: 500 }}>
                  {new Date(w.date + "T12:00:00").toLocaleDateString("en-IN", { weekday: "short", day: "numeric", month: "short" })}
                </div>
                {w.bfPercent && <div style={{ fontSize: 11, color: C.dim }}>Body fat: {w.bfPercent}%</div>}
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontSize: 24, fontWeight: 700, color: C.gold }}>{w.weight} kg</div>
                {diff !== null && (
                  <div style={{ fontSize: 12, color: parseFloat(diff) <= 0 ? C.green : C.red, fontWeight: 600 }}>
                    {parseFloat(diff) <= 0 ? "▼" : "▲"} {Math.abs(parseFloat(diff))} kg
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </>
  );
}

// ─────────────────────────────────────────────────────────────────────────
// SETTINGS TAB
// ─────────────────────────────────────────────────────────────────────────
function SettingsTab({ onReset, apiKey }) {
  const [confirmed, setConfirmed] = useState(false);
  return (
    <>
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontFamily: "'Playfair Display',serif", fontSize: 22, fontWeight: 700 }}>Settings</div>
      </div>
      <div style={s.card}>
        <span style={s.label}>API Key</span>
        <div style={{ fontSize: 13, color: C.sub, marginBottom: 14, wordBreak: "break-all", background: C.card2, padding: "10px 14px", borderRadius: 10 }}>
          {apiKey.slice(0, 16)}••••••••••••••••••
        </div>
        <button onClick={() => { if (confirmed) { onReset(); } else { setConfirmed(true); } }}
          style={{ ...s.btn(true, confirmed ? C.red : C.muted), color: confirmed ? "#fff" : C.dim }}>
          {confirmed ? "⚠️ Confirm — Clear Key & Logout" : "Change API Key"}
        </button>
        {confirmed && <div style={{ fontSize: 12, color: C.red, marginTop: 8, textAlign: "center" }}>Tap again to confirm. This will log you out.</div>}
      </div>
      <div style={s.card}>
        <span style={s.label}>Your Goals</span>
        {[
          ["Start Weight", `${GOALS.startWeight} kg`],
          ["Target Weight", `${GOALS.targetWeight} kg`],
          ["Target Body Fat", `${GOALS.targetBF}%`],
          ["Daily Calories", `${GOALS.dailyCalories} kcal`],
          ["Daily Protein", `${GOALS.dailyProtein}g`],
          ["Weekly Loss Target", `${GOALS.weeklyLoss} kg/week`],
          ["TDEE (est.)", `${GOALS.tdee} kcal`],
        ].map(([k, v]) => (
          <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: `1px solid ${C.border}` }}>
            <span style={{ fontSize: 13, color: C.sub }}>{k}</span>
            <span style={{ fontSize: 13, fontWeight: 600, color: C.gold }}>{v}</span>
          </div>
        ))}
      </div>
      <div style={{ fontSize: 11, color: C.muted, textAlign: "center", lineHeight: 1.8, padding: "0 16px" }}>
        Built for Pratik · Powered by Claude AI<br/>Data stored locally on this device only.
      </div>
    </>
  );
}
